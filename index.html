<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex Pet Desk</title>
  </head>
  <body>
    <main id="app" class="shell shell--pet" data-tauri-drag-region>
      <section class="pet-stage" data-tauri-drag-region>
        <div id="pet" class="pet" data-tauri-drag-region aria-label="Codex pet"></div>
      </section>

      <section id="panel" class="panel">
        <div class="settings-header">
          <div class="pet-meta">
            <strong>Codex Pet Desk</strong>
            <span id="app-version">Version ...</span>
          </div>
          <span class="status-pill">Desktop pet</span>
        </div>

        <div class="settings-tabs" role="tablist" aria-label="Settings pages">
          <button id="tab-settings" class="tab-button is-active" data-page="settings" type="button">Settings</button>
          <button id="tab-petdex" class="tab-button" data-page="petdex" type="button">Petdex</button>
        </div>

        <div class="settings-page is-active" data-page="settings">
        <div class="settings-section">
          <span id="pet-description" class="pet-description">Choose an installed Codex pet or load a pet package.</span>

          <label id="native-pets" class="native-pets is-hidden">
            <span>Pet</span>
            <select id="native-pet-select">
              <option value="">No installed pets found</option>
            </select>
          </label>

          <label class="scale-control">
            <span>Size</span>
            <input id="scale" type="range" min="0.6" max="2" step="0.05" value="1" />
          </label>
        </div>

        <div class="settings-section">
          <div class="section-title">Storage</div>
          <label class="storage-control">
            <span>Pet folder</span>
            <input id="pet-storage-path" type="text" readonly />
          </label>
          <div class="file-actions">
            <button id="choose-storage" class="file-button" type="button">Choose folder</button>
            <button id="reset-storage" class="file-button" type="button">Use Codex folder</button>
          </div>
        </div>

        <div class="settings-section">
          <div class="section-title">Animation</div>
          <div class="controls" aria-label="Pet animation state">
            <button class="state-button is-active" data-state="idle" type="button">Idle</button>
            <button class="state-button" data-state="waiting" type="button">Wait</button>
            <button class="state-button" data-state="running" type="button">Work</button>
            <button class="state-button" data-state="review" type="button">Review</button>
            <button class="state-button" data-state="waving" type="button">Wave</button>
            <button class="state-button" data-state="jumping" type="button">Jump</button>
            <button class="state-button" data-state="failed" type="button">Fail</button>
          </div>
        </div>

        <div class="settings-section">
          <div class="section-title">Updates</div>
          <label class="toggle-row">
            <span>
              <strong>Check on startup</strong>
              <small id="update-status">Updates are checked automatically.</small>
            </span>
            <input id="startup-update-check" type="checkbox" checked />
          </label>
          <button id="check-update" class="primary-action" type="button">Check for updates</button>
        </div>

        <div class="settings-section">
          <div class="section-title">Pet Packages</div>
          <div class="file-actions">
            <label class="file-button">
              Open pet
              <input id="file-input" type="file" accept=".json,.webp,.png" multiple />
            </label>
            <label class="file-button">
              Open folder
              <input id="folder-input" type="file" webkitdirectory multiple />
            </label>
          </div>
        </div>
        </div>

        <div class="settings-page" data-page="petdex">
          <div class="settings-section">
            <div class="section-title">Petdex</div>
            <label class="storage-control">
              <span>Search</span>
              <input id="petdex-search" type="search" placeholder="Search Petdex pets" />
            </label>
            <div class="file-actions">
              <button id="refresh-petdex" class="file-button" type="button">Refresh</button>
              <button id="open-petdex" class="file-button" type="button">Open Petdex</button>
            </div>
            <small id="petdex-status" class="status-text">Loading Petdex...</small>
          </div>

          <div id="petdex-list" class="petdex-list" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
