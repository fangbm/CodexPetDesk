<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex Pet Desk</title>
  </head>
  <body>
    <main id="app" class="shell shell--pet" data-tauri-drag-region>
      <section class="pet-stage" data-tauri-drag-region>
        <div id="speech-bubble" class="speech-bubble" aria-live="polite"></div>
        <div id="pet" class="pet" data-tauri-drag-region aria-label="Codex pet"></div>
      </section>

      <section id="panel" class="panel">
        <div class="settings-header">
          <div class="pet-meta">
            <strong>Codex Pet Desk</strong>
            <span id="app-version">Version ...</span>
          </div>
          <span class="status-pill">Desktop pet</span>
        </div>

        <div class="settings-page is-active" data-page="settings">
        <div class="settings-section">
          <span id="pet-description" class="pet-description">Adjust how the desktop pet behaves.</span>
          <label class="scale-control">
            <span>Size</span>
            <input id="scale" type="range" min="0.6" max="2" step="0.05" value="1" />
          </label>
        </div>

        <div class="settings-section">
          <div class="section-title">Storage</div>
          <label class="storage-control">
            <span>Pet folder</span>
            <input id="pet-storage-path" type="text" readonly />
          </label>
          <div class="file-actions">
            <button id="choose-storage" class="file-button" type="button">Choose folder</button>
            <button id="reset-storage" class="file-button" type="button">Use Codex folder</button>
          </div>
        </div>

        <div class="settings-section">
          <div class="section-title">Updates</div>
          <label class="toggle-row">
            <span>
              <strong>Check on startup</strong>
              <small id="update-status">Updates are checked automatically.</small>
            </span>
            <input id="startup-update-check" type="checkbox" checked />
          </label>
          <label class="storage-control">
            <span>Proxy</span>
            <input id="update-proxy" type="url" placeholder="Direct or http://127.0.0.1:7890" />
          </label>
          <button id="check-update" class="primary-action" type="button">Check for updates</button>
        </div>

        <div class="settings-section">
          <div class="section-title">Code Hooks</div>
          <label class="toggle-row">
            <span>
              <strong>Task complete bubble</strong>
              <small id="hook-status">Hooks are not installed yet.</small>
            </span>
          </label>
          <div class="file-actions">
            <button id="install-hooks" class="file-button" type="button">Install hooks</button>
            <button id="test-hook-bubble" class="file-button" type="button">Test bubble</button>
          </div>
        </div>

        </div>

        <div class="settings-page" data-page="pets">
          <div class="settings-section petdex-searchbar">
            <label class="storage-control">
              <span>Petdex</span>
              <input id="petdex-search" type="search" placeholder="Search Petdex pets" />
            </label>
          </div>

          <div class="settings-tabs pet-tabs" role="tablist" aria-label="Pet management pages">
            <button class="tab-button is-active" data-pet-page="local" type="button">Local</button>
            <button class="tab-button" data-pet-page="petdex" type="button">Petdex</button>
          </div>

          <div class="pet-page is-active" data-pet-page="local">
            <div class="settings-section">
              <div class="section-title">Local Pets</div>
              <div class="file-actions">
                <label class="file-button">
                  Open pet
                  <input id="file-input" type="file" accept=".json,.webp,.png" multiple />
                </label>
                <label class="file-button">
                  Open folder
                  <input id="folder-input" type="file" webkitdirectory multiple />
                </label>
              </div>
              <div id="local-pet-list" class="pet-list" aria-live="polite"></div>
            </div>
          </div>

          <div class="pet-page" data-pet-page="petdex">
            <small id="petdex-status" class="status-text">Loading Petdex...</small>
            <div id="petdex-list" class="pet-list" aria-live="polite"></div>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
