<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex Pet Desk</title>
  </head>
  <body>
    <main id="app" class="shell shell--pet">
      <section class="pet-stage">
        <div id="speech-bubble" class="speech-bubble" aria-live="polite"></div>
        <div id="pet" class="pet" aria-label="Codex pet"></div>
      </section>

      <nav id="pet-context-menu" class="pet-context-menu" aria-label="Pet menu" hidden>
        <button id="pet-menu-settings" type="button">设置</button>
        <button id="pet-menu-pets" type="button">宠物</button>
        <button id="pet-menu-hide" type="button">隐藏</button>
      </nav>

      <section id="panel" class="panel">
        <aside class="settings-sidebar">
          <div class="settings-brand">
            <span class="brand-mark">C</span>
            <div class="pet-meta">
              <strong>Codex Pet Desk</strong>
              <span id="app-version">Version ...</span>
            </div>
          </div>

          <nav class="settings-nav" aria-label="Settings pages">
            <button class="tab-button is-active" data-page="settings" type="button">
              <span class="nav-icon">⚙</span>
              设置
            </button>
            <button class="tab-button" data-page="pets" type="button">
              <span class="nav-icon">□</span>
              宠物
            </button>
          </nav>

          <div class="settings-sidebar-footer">
            <span class="status-pill">Desktop pet</span>
          </div>
        </aside>

        <div class="settings-main">
          <div class="settings-header">
            <div>
              <h1 id="settings-title">设置</h1>
              <p id="settings-subtitle">管理桌宠、更新、存储位置和 Codex 提醒。</p>
            </div>
          </div>

          <div class="settings-page is-active" data-page="settings">
            <section class="settings-section settings-card">
              <div class="section-title">基础设置</div>
              <label class="scale-control">
                <span>桌宠大小</span>
                <input id="scale" type="range" min="0.6" max="2" step="0.05" value="1" />
              </label>
              <span id="pet-description" class="pet-description">Adjust how the desktop pet behaves.</span>
              <div class="setting-hint">按住 Ctrl 并滚动鼠标滚轮也可以调整桌宠大小。</div>
            </section>

            <section class="settings-section settings-card">
              <div class="section-title">存储设置</div>
              <label class="storage-control">
                <span>Pet 文件夹</span>
                <input id="pet-storage-path" type="text" readonly />
              </label>
              <div class="file-actions">
                <button id="choose-storage" class="file-button" type="button">选择文件夹</button>
                <button id="reset-storage" class="file-button" type="button">使用 Codex 目录</button>
              </div>
            </section>

            <section class="settings-section settings-card">
              <div class="section-title">更新设置</div>
              <label class="toggle-row">
                <span>
                  <strong>启动时检查更新</strong>
                  <small id="update-status">Updates are checked automatically.</small>
                </span>
                <input id="startup-update-check" type="checkbox" checked />
              </label>
              <label class="storage-control">
                <span>代理</span>
                <input id="update-proxy" type="url" placeholder="Direct or http://127.0.0.1:7890" />
              </label>
              <button id="check-update" class="primary-action" type="button">检查更新</button>
            </section>

            <section class="settings-section settings-card settings-card--wide">
              <div class="section-title">Code Hooks</div>
              <label class="toggle-row">
                <span>
                  <strong>任务完成气泡</strong>
                  <small id="hook-status">Hooks are not installed yet.</small>
                </span>
              </label>
              <div class="file-actions">
                <button id="install-hooks" class="file-button" type="button">安装 Hooks</button>
                <button id="test-hook-bubble" class="file-button" type="button">测试气泡</button>
              </div>
            </section>
          </div>

          <div class="settings-page" data-page="pets">
            <div class="settings-section settings-card petdex-searchbar">
              <label class="storage-control">
                <span>搜索</span>
                <input id="petdex-search" type="search" placeholder="搜索宠物" />
              </label>
            </div>

            <div class="settings-tabs pet-tabs" role="tablist" aria-label="Pet management pages">
              <button class="tab-button is-active" data-pet-page="local" type="button">本地</button>
              <button class="tab-button" data-pet-page="petdex" type="button">Petdex</button>
            </div>

            <div class="pet-page is-active" data-pet-page="local">
              <div class="settings-section settings-card">
                <div class="section-title">本地宠物</div>
                <div class="file-actions">
                  <label class="file-button">
                    打开 Pet
                    <input id="file-input" type="file" accept=".json,.webp,.png" multiple />
                  </label>
                  <label class="file-button">
                    打开文件夹
                    <input id="folder-input" type="file" webkitdirectory multiple />
                  </label>
                </div>
                <div id="local-pet-list" class="pet-list" aria-live="polite"></div>
              </div>
            </div>

            <div class="pet-page" data-pet-page="petdex">
              <small id="petdex-status" class="status-text">Loading Petdex...</small>
              <div id="petdex-list" class="pet-list" aria-live="polite"></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
