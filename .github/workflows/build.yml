name: Full Build

on:
  workflow_run:
    workflows:
      - Lightweight CI
    types:
      - completed
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-release-secrets:
    name: Validate release secrets
    if: >
      github.event_name != 'workflow_run' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'master')
      )
    runs-on: ubuntu-22.04
    steps:
      - name: Check updater signing secret
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::Missing TAURI_SIGNING_PRIVATE_KEY repository secret. Set it from the generated local .tauri-keys/updater.key file."
            exit 1
          fi

  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}
    needs: validate-release-secrets

    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: windows-x64
            runner: windows-latest
          - name: macos-arm64
            runner: macos-latest
          - name: linux-x64
            runner: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Set release version
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const refType = process.env.GITHUB_REF_TYPE;
          const refName = process.env.GITHUB_REF_NAME || "";
          const runNumber = process.env.GITHUB_RUN_NUMBER;
          const tagVersion = refName.replace(/^v/, "");
          const version = refType === "tag" && /^\d+\.\d+\.\d+([-.].+)?$/.test(tagVersion)
            ? tagVersion
            : `0.1.${runNumber}`;

          for (const file of ["package.json", "src-tauri/tauri.conf.json"]) {
            const json = JSON.parse(fs.readFileSync(file, "utf8"));
            json.version = version;
            fs.writeFileSync(file, `${JSON.stringify(json, null, 2)}\n`);
          }

          console.log(`RELEASE_VERSION=${version}`);
          fs.appendFileSync(process.env.GITHUB_ENV, `RELEASE_VERSION=${version}\n`);
          NODE

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: codex-pet-desk-v${{ env.RELEASE_VERSION }}
          releaseName: Codex Pet Desk v${{ env.RELEASE_VERSION }}
          releaseBody: Automated full build from ${{ github.sha }}.
          releaseDraft: false
          prerelease: false
