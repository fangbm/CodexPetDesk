name: Full Build

on:
  workflow_run:
    workflows:
      - Lightweight CI
    types:
      - completed
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version-change:
    name: Detect version change
    runs-on: ubuntu-22.04
    outputs:
      changed: ${{ steps.detect.outputs.changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0

      - name: Check version fields
        id: detect
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const cp = require("node:child_process");

          if (process.env.GITHUB_EVENT_NAME !== "workflow_run") {
            fs.appendFileSync(process.env.GITHUB_OUTPUT, "changed=true\n");
            console.log("Manual and tag builds are allowed.");
            process.exit(0);
          }

          const head = cp.execFileSync("git", ["rev-parse", "HEAD"], { encoding: "utf8" }).trim();
          const parent = cp.execFileSync("git", ["rev-parse", "HEAD^"], { encoding: "utf8" }).trim();

          function fileAt(ref, file) {
            try {
              return cp.execFileSync("git", ["show", `${ref}:${file}`], { encoding: "utf8" });
            } catch {
              return "";
            }
          }

          function versionAt(ref, file) {
            const content = ref === "WORKTREE"
              ? fs.readFileSync(file, "utf8")
              : fileAt(ref, file);
            if (!content) return "";
            return JSON.parse(content).version || "";
          }

          const files = ["package.json", "src-tauri/tauri.conf.json"];
          const changed = files.some((file) => versionAt(parent, file) !== versionAt("WORKTREE", file));
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `changed=${changed}\n`);
          console.log(`Version changed between ${parent} and ${head}: ${changed}`);
          NODE

  validate-release-secrets:
    name: Validate release secrets
    needs: version-change
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'master') &&
        needs.version-change.outputs.changed == 'true'
      )
    runs-on: ubuntu-22.04
    steps:
      - name: Check updater signing secret
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::Missing TAURI_SIGNING_PRIVATE_KEY repository secret. Set it from the generated local .tauri-keys/updater.key file."
            exit 1
          fi

  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}
    needs: validate-release-secrets

    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: windows-x64
            runner: windows-latest
          - name: macos-arm64
            runner: macos-latest
          - name: linux-x64
            runner: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-bin: false

      - name: Install frontend dependencies
        run: npm ci

      - name: Set release version
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const refType = process.env.GITHUB_REF_TYPE;
          const refName = process.env.GITHUB_REF_NAME || "";
          const tagVersion = refName.replace(/^v/, "");
          const version = refType === "tag" && /^\d+\.\d+\.\d+([-.].+)?$/.test(tagVersion)
            ? tagVersion
            : JSON.parse(fs.readFileSync("package.json", "utf8")).version;

          for (const file of ["package.json", "src-tauri/tauri.conf.json"]) {
            const json = JSON.parse(fs.readFileSync(file, "utf8"));
            json.version = version;
            fs.writeFileSync(file, `${JSON.stringify(json, null, 2)}\n`);
          }

          console.log(`RELEASE_VERSION=${version}`);
          fs.appendFileSync(process.env.GITHUB_ENV, `RELEASE_VERSION=${version}\n`);
          NODE

      - name: Build Tauri app
        run: npm run tauri:build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codex-pet-desk-${{ matrix.platform.name }}
          if-no-files-found: error
          path: src-tauri/target/release/bundle/**/*

  build-widget:
    name: Build web widget
    runs-on: ubuntu-22.04
    needs: validate-release-secrets

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build web widget
        run: npm run build:widget

      - name: Package web widget
        run: |
          mkdir -p release-widget/codex-pet-widget
          cp dist-widget/codex-pet-widget*.js release-widget/codex-pet-widget/
          tar -czf codex-pet-widget.tar.gz -C release-widget codex-pet-widget
          (cd release-widget && zip -r ../codex-pet-widget.zip codex-pet-widget)

      - name: Upload widget files to Cloudflare R2
        shell: bash
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ vars.R2_BUCKET || 'codex-pet-desk' }}
          R2_PREFIX: ${{ vars.R2_PREFIX || 'codex-pet' }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_EC2_METADATA_DISABLED: true
        run: |
          missing=0
          for name in R2_ACCOUNT_ID R2_ACCESS_KEY_ID R2_SECRET_ACCESS_KEY; do
            if [ -z "${!name}" ]; then
              echo "::notice::Skipping R2 upload because ${name} is not configured."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 0
          fi

          if ! command -v aws >/dev/null 2>&1; then
            python3 -m pip install --user awscli
            export PATH="$HOME/.local/bin:$PATH"
          fi

          endpoint="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          prefix="${R2_PREFIX:-codex-pet}"
          prefix="${prefix#/}"
          prefix="${prefix%/}"

          object_key() {
            if [ -n "$prefix" ]; then
              printf '%s/%s' "$prefix" "$1"
            else
              printf '%s' "$1"
            fi
          }

          upload_file() {
            local source="$1"
            local key="$2"
            local content_type="$3"
            local cache_control="$4"
            aws s3 cp "$source" "s3://${R2_BUCKET}/${key}" \
              --endpoint-url "$endpoint" \
              --content-type "$content_type" \
              --cache-control "$cache_control"
          }

          upload_file "dist-widget/codex-pet-widget.js" "$(object_key "codex-pet-widget.js")" "text/javascript; charset=utf-8" "public,max-age=300"
          upload_file "dist-widget/codex-pet-widget.es.js" "$(object_key "codex-pet-widget.es.js")" "text/javascript; charset=utf-8" "public,max-age=300"

          if [ -d "public/pets" ]; then
            while IFS= read -r -d '' file; do
              rel="${file#public/pets/}"
              lower="${file,,}"
              case "$lower" in
                *.json)
                  content_type="application/json; charset=utf-8"
                  cache_control="public,max-age=300"
                  ;;
                *.webp)
                  content_type="image/webp"
                  cache_control="public,max-age=31536000,immutable"
                  ;;
                *.png)
                  content_type="image/png"
                  cache_control="public,max-age=31536000,immutable"
                  ;;
                *.gif)
                  content_type="image/gif"
                  cache_control="public,max-age=31536000,immutable"
                  ;;
                *)
                  content_type="application/octet-stream"
                  cache_control="public,max-age=14400"
                  ;;
              esac
              upload_file "$file" "$(object_key "pets/${rel}")" "$content_type" "$cache_control"
            done < <(find public/pets -type f -print0)
          fi

      - name: Upload web widget artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-pet-widget
          if-no-files-found: error
          path: |
            codex-pet-widget.tar.gz
            codex-pet-widget.zip

  publish-release:
    name: Publish release
    runs-on: ubuntu-22.04
    needs:
      - build
      - build-widget

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Set release version
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const refType = process.env.GITHUB_REF_TYPE;
          const refName = process.env.GITHUB_REF_NAME || "";
          const tagVersion = refName.replace(/^v/, "");
          const version = refType === "tag" && /^\d+\.\d+\.\d+([-.].+)?$/.test(tagVersion)
            ? tagVersion
            : JSON.parse(fs.readFileSync("package.json", "utf8")).version;
          fs.appendFileSync(process.env.GITHUB_ENV, `RELEASE_VERSION=${version}\n`);
          NODE

      - name: Prepare release notes
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const cp = require("node:child_process");

          function git(args) {
            return cp.execFileSync("git", args, { encoding: "utf8" }).trim();
          }

          const version = process.env.RELEASE_VERSION;
          const head = git(["rev-parse", "HEAD"]);
          let base = "";
          try {
            base = git(["describe", "--tags", "--match", "codex-pet-desk-v*", "--abbrev=0", "HEAD^"]);
          } catch {}

          const range = base ? `${base}..HEAD` : "HEAD";
          const raw = git(["log", range, "--pretty=format:%s%n%b%n---END---"]);
          const entries = raw
            .split("\n---END---")
            .map((entry) => entry.trim())
            .filter(Boolean)
            .map((entry) => {
              const [subject, ...bodyLines] = entry.split(/\r?\n/);
              const changesIndex = bodyLines.findIndex((line) => /^Changes:\s*$/i.test(line.trim()));
              if (changesIndex === -1) return `- ${subject}`;
              const changes = bodyLines
                .slice(changesIndex + 1)
                .map((line) => line.trim())
                .filter((line) => /^[-*]\s+/.test(line))
                .map((line) => `  ${line.replace(/^[-*]\s+/, "- ")}`);
              return [`- ${subject}`, ...changes].join("\n");
            });

          const notes = [
            `Codex Pet Desk v${version}`,
            "",
            `Build commit: ${head}`,
            "",
            "Changes:",
            entries.length ? entries.join("\n") : "- Automated full build."
          ].join("\n");

          fs.writeFileSync("RELEASE_NOTES.md", `${notes}\n`);
          NODE

      - name: Prepare release assets
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");

          const root = "release-artifacts";
          const out = "release-upload";
          const repo = process.env.GITHUB_REPOSITORY;
          const version = process.env.RELEASE_VERSION;
          const tag = `codex-pet-desk-v${version}`;
          const notes = fs.readFileSync("RELEASE_NOTES.md", "utf8").trim();
          const platforms = {};

          fs.rmSync(out, { recursive: true, force: true });
          fs.mkdirSync(out, { recursive: true });

          function walk(dir) {
            return fs.readdirSync(dir, { withFileTypes: true }).flatMap((entry) => {
              const full = path.join(dir, entry.name);
              return entry.isDirectory() ? walk(full) : [full];
            });
          }

          function copyAsset(file) {
            const name = path.basename(file);
            const dest = path.join(out, name);
            fs.copyFileSync(file, dest);
            return name;
          }

          function assetUrl(name) {
            return `https://github.com/${repo}/releases/download/${tag}/${encodeURIComponent(name)}`;
          }

          function addUpdater(platform, matcher, rank = () => 0) {
            const file = files
              .filter(matcher)
              .sort((a, b) => rank(b) - rank(a))[0];
            if (!file) throw new Error(`Missing updater artifact for ${platform}`);
            const sigFile = `${file}.sig`;
            if (!fs.existsSync(sigFile)) throw new Error(`Missing signature for ${path.basename(file)}`);
            const name = copyAsset(file);
            copyAsset(sigFile);
            platforms[platform] = {
              signature: fs.readFileSync(sigFile, "utf8").trim(),
              url: assetUrl(name)
            };
          }

          function isReleaseAsset(file) {
            const name = path.basename(file);
            return /\.(exe|msi|dmg|AppImage|deb|rpm)$/i.test(name)
              || /\.app\.tar\.gz$/i.test(name)
              || /^codex-pet-widget\.(zip|tar\.gz)$/i.test(name);
          }

          const files = walk(root);
          for (const file of files) {
            if (isReleaseAsset(file) || (file.endsWith(".sig") && isReleaseAsset(file.slice(0, -4)))) {
              copyAsset(file);
            }
          }

          addUpdater(
            "windows-x86_64",
            (file) => /windows-x64/.test(file) && /\.(exe|msi)$/i.test(file),
            (file) => /setup\.exe$/i.test(file) ? 2 : /\.msi$/i.test(file) ? 1 : 0
          );
          addUpdater("darwin-aarch64", (file) => /macos-arm64/.test(file) && /\.app\.tar\.gz$/i.test(file));
          addUpdater("linux-x86_64", (file) => /linux-x64/.test(file) && /\.AppImage$/i.test(file));

          fs.writeFileSync(path.join(out, "latest.json"), `${JSON.stringify({
            version,
            notes,
            pub_date: new Date().toISOString(),
            platforms
          }, null, 2)}\n`);
          NODE

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="codex-pet-desk-v${RELEASE_VERSION}"
          gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag || true
          gh release create "$TAG" release-upload/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "Codex Pet Desk v${RELEASE_VERSION}" \
            --notes-file RELEASE_NOTES.md
