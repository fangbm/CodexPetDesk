name: Full Build

on:
  workflow_run:
    workflows:
      - Lightweight CI
    types:
      - completed
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-release-secrets:
    name: Validate release secrets
    if: >
      github.event_name != 'workflow_run' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'master')
      )
    runs-on: ubuntu-22.04
    steps:
      - name: Check updater signing secret
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::Missing TAURI_SIGNING_PRIVATE_KEY repository secret. Set it from the generated local .tauri-keys/updater.key file."
            exit 1
          fi

  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}
    needs: validate-release-secrets

    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: windows-x64
            runner: windows-latest
          - name: macos-arm64
            runner: macos-latest
          - name: linux-x64
            runner: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Set release version
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const refType = process.env.GITHUB_REF_TYPE;
          const refName = process.env.GITHUB_REF_NAME || "";
          const runNumber = process.env.GITHUB_RUN_NUMBER;
          const tagVersion = refName.replace(/^v/, "");
          const version = refType === "tag" && /^\d+\.\d+\.\d+([-.].+)?$/.test(tagVersion)
            ? tagVersion
            : `0.1.${runNumber}`;

          for (const file of ["package.json", "src-tauri/tauri.conf.json"]) {
            const json = JSON.parse(fs.readFileSync(file, "utf8"));
            json.version = version;
            fs.writeFileSync(file, `${JSON.stringify(json, null, 2)}\n`);
          }

          console.log(`RELEASE_VERSION=${version}`);
          fs.appendFileSync(process.env.GITHUB_ENV, `RELEASE_VERSION=${version}\n`);
          NODE

      - name: Build Tauri app
        run: npm run tauri:build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codex-pet-desk-${{ matrix.platform.name }}
          if-no-files-found: error
          path: src-tauri/target/release/bundle/**/*

  publish-release:
    name: Publish release
    runs-on: ubuntu-22.04
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Set release version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME#v}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.].+)?$ ]]; then
            echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_VERSION=0.1.${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          fi

      - name: Prepare release assets
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");

          const root = "release-artifacts";
          const out = "release-upload";
          const repo = process.env.GITHUB_REPOSITORY;
          const version = process.env.RELEASE_VERSION;
          const tag = `codex-pet-desk-v${version}`;
          const notes = `Automated full build from ${process.env.GITHUB_SHA}.`;
          const platforms = {};

          fs.rmSync(out, { recursive: true, force: true });
          fs.mkdirSync(out, { recursive: true });

          function walk(dir) {
            return fs.readdirSync(dir, { withFileTypes: true }).flatMap((entry) => {
              const full = path.join(dir, entry.name);
              return entry.isDirectory() ? walk(full) : [full];
            });
          }

          function copyAsset(file) {
            const name = path.basename(file);
            const dest = path.join(out, name);
            fs.copyFileSync(file, dest);
            return name;
          }

          function assetUrl(name) {
            return `https://github.com/${repo}/releases/download/${tag}/${encodeURIComponent(name)}`;
          }

          function addUpdater(platform, matcher, rank = () => 0) {
            const file = files
              .filter(matcher)
              .sort((a, b) => rank(b) - rank(a))[0];
            if (!file) throw new Error(`Missing updater artifact for ${platform}`);
            const sigFile = `${file}.sig`;
            if (!fs.existsSync(sigFile)) throw new Error(`Missing signature for ${path.basename(file)}`);
            const name = copyAsset(file);
            copyAsset(sigFile);
            platforms[platform] = {
              signature: fs.readFileSync(sigFile, "utf8").trim(),
              url: assetUrl(name)
            };
          }

          const files = walk(root);
          for (const file of files) {
            if (!file.endsWith(".sig")) copyAsset(file);
          }

          addUpdater(
            "windows-x86_64",
            (file) => /windows-x64/.test(file) && /\.zip$/i.test(file),
            (file) => /nsis|setup/i.test(file) ? 2 : /msi/i.test(file) ? 1 : 0
          );
          addUpdater("darwin-aarch64", (file) => /macos-arm64/.test(file) && /\.app\.tar\.gz$/i.test(file));
          addUpdater("linux-x86_64", (file) => /linux-x64/.test(file) && /\.AppImage\.tar\.gz$/i.test(file));

          fs.writeFileSync(path.join(out, "latest.json"), `${JSON.stringify({
            version,
            notes,
            pub_date: new Date().toISOString(),
            platforms
          }, null, 2)}\n`);
          NODE

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="codex-pet-desk-v${RELEASE_VERSION}"
          gh release delete "$TAG" --yes --cleanup-tag || true
          gh release create "$TAG" release-upload/* \
            --title "Codex Pet Desk v${RELEASE_VERSION}" \
            --notes "Automated full build from ${GITHUB_SHA}."
