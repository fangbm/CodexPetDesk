name: Lightweight CI

on:
  push:
    branches:
      - main
      - master
    paths:
      - package.json
      - src-tauri/tauri.conf.json
  pull_request:
    paths:
      - package.json
      - src-tauri/tauri.conf.json

jobs:
  version-change:
    name: Detect version change
    runs-on: ubuntu-22.04
    outputs:
      changed: ${{ steps.detect.outputs.changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version fields
        id: detect
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const cp = require("node:child_process");

          const event = process.env.GITHUB_EVENT_NAME;
          const payload = JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH, "utf8"));
          const base = event === "pull_request"
            ? payload.pull_request.base.sha
            : payload.before;
          const head = event === "pull_request"
            ? payload.pull_request.head.sha
            : process.env.GITHUB_SHA;

          function fileAt(ref, file) {
            try {
              return cp.execFileSync("git", ["show", `${ref}:${file}`], { encoding: "utf8" });
            } catch {
              return "";
            }
          }

          function versionAt(ref, file) {
            const content = ref === "WORKTREE"
              ? fs.readFileSync(file, "utf8")
              : fileAt(ref, file);
            if (!content) return "";
            return JSON.parse(content).version || "";
          }

          const files = ["package.json", "src-tauri/tauri.conf.json"];
          const changed = files.some((file) => versionAt(base, file) !== versionAt("WORKTREE", file));
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `changed=${changed}\n`);
          console.log(`Version changed between ${base} and ${head}: ${changed}`);
          NODE

  check:
    name: Check ${{ matrix.platform.name }}
    needs: version-change
    if: needs.version-change.outputs.changed == 'true'
    runs-on: ${{ matrix.platform.runner }}

    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: windows-x64
            runner: windows-latest
          - name: macos-arm64
            runner: macos-latest
          - name: linux-x64
            runner: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Check JavaScript syntax
        run: node --check src/main.js

      - name: Build frontend
        run: npm run build

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Check Tauri backend
        run: cargo check --manifest-path src-tauri/Cargo.toml
